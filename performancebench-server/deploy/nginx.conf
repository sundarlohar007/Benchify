# nginx configuration — Benchify (PerformanceBench) Server
# Production reverse proxy with TLS termination + Let's Encrypt
#
# Replace benchify.example.com with your domain name.
# Certbot ACME challenge at /.well-known/acme-challenge/ is served from /var/www/certbot.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client max body size — session uploads can be large
    client_max_body_size 500M;

    # Upstream server (Docker service name)
    upstream benchify_server {
        server server:3000;
    }

    server {
        listen 80;
        server_name benchify.example.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name benchify.example.com;

        # TLS configuration
        ssl_certificate     /etc/letsencrypt/live/benchify.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/benchify.example.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
        ssl_prefer_server_ciphers on;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Health check
        location /health {
            proxy_pass http://benchify_server;
        }

        # WebSocket upgrade for live overlay (/ws/live/*)
        location /ws/ {
            proxy_pass http://benchify_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # API — proxy all requests to the Axum server
        location / {
            proxy_pass http://benchify_server;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
