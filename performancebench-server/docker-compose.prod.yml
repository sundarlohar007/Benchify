# docker-compose.prod.yml — Production deployment with nginx + Let's Encrypt
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy deploy/nginx.conf to ./deploy/nginx.conf (relative to this file)
#   2. Set environment variables (JWT_SECRET, POSTGRES_PASSWORD, SSO_REDIRECT_BASE_URL)
#   3. For initial Let's Encrypt cert: docker compose run --rm certbot certonly ...

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-benchify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-benchify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-benchify}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # No port exposure — only accessible from internal Docker network

  server:
    build: .
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-benchify}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-benchify}
      JWT_SECRET: ${JWT_SECRET}
      HOST: 0.0.0.0
      PORT: 3000
      SSO_ENABLED: ${SSO_ENABLED:-false}
      SSO_REDIRECT_BASE_URL: ${SSO_REDIRECT_BASE_URL:-https://benchify.example.com}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No port exposure — only accessible via nginx

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - server
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

volumes:
  pgdata:
  certbot_www:
  certbot_conf:
