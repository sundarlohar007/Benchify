services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: benchify
      POSTGRES_PASSWORD: benchify
      POSTGRES_DB: benchify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchify"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://benchify:benchify@db:5432/benchify
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
