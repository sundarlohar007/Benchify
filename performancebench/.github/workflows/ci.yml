# CI matrix: build + test + package on all 3 platforms.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test test/unit/

      - name: Build Windows
        if: runner.os == 'Windows'
        run: flutter build windows --release

      - name: Package Windows installer
        if: runner.os == 'Windows'
        uses: joncloud/makensis-action@v4
        with:
          script-file: windows/installer/performancebench.nsi

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: '*.exe'
          retention-days: 7

      - name: Build macOS
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: bash macos/package_dmg.sh

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'
          retention-days: 7

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: bash linux/build_appimage.sh

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: '*.AppImage'
          retention-days: 7

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MIT headers
        run: |
          dart_count=$(grep -rL "SPDX-License-Identifier: MIT" lib/ test/ --include="*.dart" | wc -l)
          py_count=$(grep -rL "SPDX-License-Identifier: MIT" ios_agents/ --include="*.py" | wc -l)
          if [ "$dart_count" -gt 0 ]; then
            echo "ERROR: $dart_count .dart files missing MIT header"
            grep -rL "SPDX-License-Identifier: MIT" lib/ test/ --include="*.dart"
            exit 1
          fi
          if [ "$py_count" -gt 0 ]; then
            echo "ERROR: $py_count .py files missing MIT header"
            exit 1
          fi
          echo "All source files have MIT SPDX headers."

  url-allowlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no unauthorized URLs
        run: |
          bad_urls=$(grep -rn "http://\|https://" lib/ --include="*.dart" | grep -v "github.com" | grep -v "localhost" | grep -v "127.0.0.1" | grep -v "SPDX" || true)
          if [ -n "$bad_urls" ]; then
            echo "ERROR: Unauthorized URLs found in source:"
            echo "$bad_urls"
            exit 1
          fi
          echo "URL allow-list check passed."
