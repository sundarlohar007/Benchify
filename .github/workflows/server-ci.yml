name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: benchify
          POSTGRES_PASSWORD: benchify
          POSTGRES_DB: benchify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            performancebench-server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('performancebench-server/Cargo.lock') }}

      - name: Run tests
        working-directory: performancebench-server
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://benchify:benchify@localhost:5432/benchify

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            performancebench-server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('performancebench-server/Cargo.lock') }}

      - name: Run clippy
        working-directory: performancebench-server
        run: cargo clippy --workspace -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: performancebench-server
        run: cargo fmt --check --all
