name: Web Dashboard CI

on:
  push:
    paths:
      - 'performancebench-web/**'
  pull_request:
    paths:
      - 'performancebench-web/**'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: performancebench-web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: performancebench-web
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        working-directory: performancebench-web
        run: pnpm exec tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: performancebench-web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: performancebench-web
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: performancebench-web
        run: pnpm build
