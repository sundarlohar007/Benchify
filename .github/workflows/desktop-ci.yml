# CI matrix: build + test + package on all 3 platforms.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: performancebench

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run all tests
        run: flutter test --concurrency=1

      - name: Build Windows
        if: runner.os == 'Windows'
        run: flutter build windows --release

      - name: Package Windows installer
        if: runner.os == 'Windows'
        uses: joncloud/makensis-action@v4
        with:
          script-file: windows/installer/performancebench.nsi

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: '*.exe'
          retention-days: 7

      - name: Build macOS
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: bash macos/package_dmg.sh

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'
          retention-days: 7

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev
          flutter build linux --release

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: bash linux/build_appimage.sh

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: '*.AppImage'
          retention-days: 7

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MIT headers on source files
        run: |
          missing=0
          for dir in lib/ test/ ios_agents/; do
            if [ -d "$dir" ]; then
              count=$(grep -rL "SPDX-License-Identifier: MIT" "$dir" --include="*.dart" --include="*.py" 2>/dev/null | wc -l)
              if [ "$count" -gt 0 ]; then
                echo "ERROR: $count files in $dir missing MIT header"
                grep -rL "SPDX-License-Identifier: MIT" "$dir" --include="*.dart" --include="*.py"
                missing=$((missing + count))
              fi
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "FAILED: $missing file(s) missing MIT SPDX header"
            exit 1
          fi
          echo "All source files have MIT SPDX headers."

  url-allowlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no unauthorized URLs
        run: |
          bad_urls=$(grep -rn "http://\|https://" lib/ --include="*.dart" | grep -v "github.com" | grep -v "localhost" | grep -v "127.0.0.1" | grep -v "SPDX" | grep -v "pub.dev" || true)
          if [ -n "$bad_urls" ]; then
            echo "ERROR: Unauthorized URLs found in source:"
            echo "$bad_urls"
            exit 1
          fi
          echo "URL allow-list check passed."
