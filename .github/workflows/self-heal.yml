name: Self-Heal — Report CI Failures

on:
  workflow_run:
    workflows: ["CI", "Server CI", "Injector SDK CI", "Web Dashboard CI", "iOS Tests", "Privacy Verification"]
    types:
      - completed

permissions:
  issues: write
  contents: read

jobs:
  report-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Collect failure context
        id: context
        run: |
          echo "## CI Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.event.workflow_run.head_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ github.event.workflow_run.html_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event.workflow_run.event }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Action Required" >> $GITHUB_STEP_SUMMARY
          echo "Run Claude Code locally to auto-fix:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Fetch latest changes" >> $GITHUB_STEP_SUMMARY
          echo "git pull origin main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Feed CI failure to Claude for auto-fix" >> $GITHUB_STEP_SUMMARY
          echo "echo \"Fix the CI failure in workflow ${{ github.event.workflow_run.name }}.\"" >> $GITHUB_STEP_SUMMARY
          echo "\"Run URL: ${{ github.event.workflow_run.html_url }}\"" >> $GITHUB_STEP_SUMMARY
          echo "\"Commit: ${{ github.event.workflow_run.head_sha }}\"" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let errorDetails = '## Failed Jobs\n\n';
            for (const job of failedJobs) {
              errorDetails += `- **${job.name}** (${job.html_url})\n`;

              // Get failed steps for annotations
              for (const step of (job.steps || [])) {
                if (step.conclusion === 'failure') {
                  errorDetails += `  - ❌ \`${step.name}\`\n`;
                }
              }
            }

            errorDetails += `\n---\n### Auto-Fix Instructions\n`;
            errorDetails += `Feed this issue to Claude Code to diagnose and fix automatically:\n`;
            errorDetails += '```bash\n';
            errorDetails += `git pull origin main\n`;
            errorDetails += `# Tell Claude: "Fix the CI failure from issue #[issue_number].`;
            errorDetails += ` Run URL: ${run.data.html_url}"\n`;
            errorDetails += '```\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI FAILURE] ${run.data.name} — ${run.data.head_commit.message.substring(0, 70)}`,
              body: errorDetails,
              labels: ['ci-failure', 'auto-fix']
            });
