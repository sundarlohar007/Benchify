# iOS integration tests on macOS runner with iOS simulator (D-05/D-06).

name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-test:
    runs-on: macos-latest
    continue-on-error: true  # Requires real iOS simulator — non-blocking for now
    defaults:
      run:
        working-directory: performancebench
    strategy:
      matrix:
        ios-version: ['16.4', '17.2']
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install system deps (macOS)
        run: |
          if [ -d /opt/homebrew ]; then
            brew install openssl@3
            echo "LDFLAGS=-L/opt/homebrew/opt/openssl@3/lib" >> $GITHUB_ENV
            echo "CPPFLAGS=-I/opt/homebrew/opt/openssl@3/include" >> $GITHUB_ENV
          elif [ -d /usr/local/Homebrew ]; then
            brew install openssl@3
            echo "LDFLAGS=-L/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
            echo "CPPFLAGS=-I/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
          else
            echo "No Homebrew found, trying without OpenSSL"
          fi

      - name: Install pyidevice
        run: pip3 install --break-system-packages py-ios-device

      - name: Boot iOS simulator
        run: |
          TARGET_VER="${{ matrix.ios-version }}"

          # Pick runtime: exact match → major-version match → latest available
          RUNTIME=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          rts = [r for r in data.get('runtimes', []) if r.get('isAvailable', True)]
          target = '$TARGET_VER'
          m = next((r for r in rts if r.get('version') == target), None)
          if not m:
              major = target.split('.')[0]
              m = next((r for r in rts if r.get('version', '').startswith(major + '.')), None)
          if not m and rts:
              def keyfn(r):
                  try:
                      return tuple(int(x) for x in r['version'].split('.'))
                  except Exception:
                      return (0,)
              rts.sort(key=keyfn, reverse=True)
              m = rts[0]
          print(m['identifier'] if m else '')
          ")

          # Pick a modern iPhone device type compatible with iOS 16+/17+
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          types = data.get('devicetypes', [])
          for pref in ['iPhone-15-Pro', 'iPhone-15', 'iPhone-14-Pro', 'iPhone-14',
                       'iPhone-16-Pro', 'iPhone-16', 'iPhone-13']:
              m = next((t for t in types
                        if t.get('identifier', '').endswith('.' + pref)), None)
              if m:
                  print(m['identifier'])
                  sys.exit(0)
          iphones = [t for t in types if 'iPhone' in t.get('identifier', '')]
          if iphones:
              print(iphones[-1]['identifier'])
          ")

          if [ -z "$RUNTIME" ] || [ -z "$DEVICE_TYPE" ]; then
            echo "::warning::No iOS runtime/device available for $TARGET_VER on this image — skipping simulator boot"
            exit 0
          fi

          echo "Runtime: $RUNTIME"
          echo "Device:  $DEVICE_TYPE"

          UDID=$(xcrun simctl create "Test-$TARGET_VER" "$DEVICE_TYPE" "$RUNTIME")
          xcrun simctl boot "$UDID"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run iOS integration tests
        run: |
          flutter test test/integration/ios_integration_test.dart --dart-define=IOS_UDID=${{ env.SIM_UDID }}

      - name: Shutdown simulator
        if: always()
        run: |
          xcrun simctl shutdown ${{ env.SIM_UDID }} || true
          xcrun simctl delete ${{ env.SIM_UDID }} || true
